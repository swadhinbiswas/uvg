<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGradient)"/>
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- Package Box (3D) -->
  <g filter="url(#shadow)">
    <!-- Box Top -->
    <path d="M 200 120 L 260 140 L 200 160 L 140 140 Z" fill="url(#boxGradient)"/>
    <!-- Box Right Side -->
    <path d="M 260 140 L 260 220 L 200 240 L 200 160 Z" fill="#c7d2fe"/>
    <!-- Box Left Side -->
    <path d="M 140 140 L 140 220 L 200 240 L 200 160 Z" fill="#a5b4fc"/>
  </g>
  
  <!-- Symlink Arrows (representing runtime connections) -->
  <g opacity="0.9">
    <!-- Arrow 1 -->
    <path d="M 160 180 Q 140 200 160 220" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 155 215 L 160 220 L 165 215" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arrow 2 -->
    <path d="M 240 180 Q 260 200 240 220" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 235 215 L 240 220 L 245 215" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arrow 3 -->
    <path d="M 200 240 Q 200 260 200 280" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 195 275 L 200 280 L 205 275" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- UVG Text -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="4">
    UVG
  </text>
  
  <!-- Subtitle -->
  <text x="200" y="345" font-family="Arial, sans-serif" font-size="14" fill="#e0e7ff" text-anchor="middle" letter-spacing="2">
    GLOBAL RUNTIME
  </text>
</svg>
